# =============================================================================
# nginx.conf — XpressPro FX / NeXTrade production reverse proxy
#
# INSTRUCTIONS:
#   1. Copy to /etc/nginx/sites-available/xpressfx
#   2. Symlink: ln -s /etc/nginx/sites-available/xpressfx /etc/nginx/sites-enabled/
#   3. Test:    nginx -t
#   4. Reload:  systemctl reload nginx
#   5. SSL:     certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# This file is a configuration template — it is NOT activated automatically.
# =============================================================================

# Upstream — Node API server (Express)
upstream xpressfx_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Main HTTPS server block
# (certbot --nginx will populate the ssl_certificate lines below)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # --------------------------------------------------------------------------
    # SSL — certbot will populate these paths. Do not edit manually.
    # --------------------------------------------------------------------------
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --------------------------------------------------------------------------
    # Security headers
    # --------------------------------------------------------------------------
    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Permissions-Policy         "geolocation=(), microphone=()"       always;

    # CSP placeholder — tighten before going live. Replace 'unsafe-inline' with
    # nonce-based or hash-based policies after auditing your JS/CSS dependencies.
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.moonpay.com; frame-ancestors 'none';" always;

    # --------------------------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # --------------------------------------------------------------------------
    # API — reverse proxy to Express server
    # --------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://xpressfx_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming/SSE responses (live-chat etc.)
        proxy_buffering off;
    }

    # --------------------------------------------------------------------------
    # Admin portal — reverse proxy (built Vite SPA served by the API or a separate
    # static server; adjust port if serving admin separately)
    # --------------------------------------------------------------------------
    location /xpadmin/ {
        proxy_pass         http://xpressfx_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --------------------------------------------------------------------------
    # Frontend — serve built static files from Vite
    # --------------------------------------------------------------------------
    root /var/www/xpressfx;
    index index.html;

    # Long-cache fingerprinted assets (Vite hashes filenames)
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all non-asset, non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # --------------------------------------------------------------------------
    # Deny dotfiles (e.g. .env, .git)
    # --------------------------------------------------------------------------
    location ~ /\. {
        deny all;
    }

    # --------------------------------------------------------------------------
    # Logging
    # --------------------------------------------------------------------------
    access_log /var/log/nginx/xpressfx-access.log;
    error_log  /var/log/nginx/xpressfx-error.log warn;
}
